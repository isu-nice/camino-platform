server:
  port: 8081

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5432/camino
    username: camino
    password: ${DB_PASSWORD:camino_local_pw}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 3000
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
  sql:
    init:
      mode: always